# =====================================================================
# PARAMÈTRES D'EXPORT (MODULE_2, MODULE_4)
# =====================================================================
export:
  precision_decimales: 9
  compression_niveau: 9  # gzip level 0-9
  format: "json"
  encodage: "utf-8"
  
  fichiers:
    pentades: "pentades_72_finales.json"
    particules: "particules_modele_standard.json"
    transitions_faibles: "transitions_faibles.json"
    zeeman: "zeeman_pentadique_avec_incertitudes.json"
    hydrogene_niveaux: "hydrogene_pentadique_niveaux.json"
    hydrogene_transitions: "hydrogene_pentadique_transitions.json.gz"
    regles_selection: "regles_selection_resultats.json"

# =====================================================================
# NOTES MÉTHODOLOGIQUES
# =====================================================================
notes_methodologiques:
  masses_particules: |
    Les masses dans MODULE_2 sont actuellement CALIBRÉES sur PDG 2022.
    Une formule de dérivation first-principles (facteurs {1, 207, 3477})
    est en développement pour la version 3.0.
  
  facteurs_famille: |
    Les facteurs de famille {1.0, 1.2, 1.5, 1.8, 0.5, 0.8} sont empiriques.
    Objectif : dériver ces facteurs des angles de Cl(6,0) dans une version future.
  
  couplage_janus: |
    Le champ 'signe' (-1/+1) dans les pentades correspond au secteur
    de masse positive/négative du modèle Janus. Ce couplage est actuellement
    implémenté mais nécessite validation expérimentale indépendante.
  
  periodicite_bott: |
    La résonance à 200 MeV dans les magnétars valide l'octave 5.
    Le facteur de projection f_proj ≈ 82 est empirique et nécessite
    une dérivation first-principles dans le cadre Cl(6,6).

